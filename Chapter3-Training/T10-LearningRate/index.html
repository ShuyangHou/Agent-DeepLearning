<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T10 · 学习率</title>
  <link rel="stylesheet" href="./base.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="edu-root t10-root" data-tr-id="t10_module_root" data-tr-view="module_show" data-tr-props='{"module":"T10"}'>
    <section class="edu-shell t10-shell">
      <header class="edu-header t10-header">
        <div>
          <span class="t10-kicker">T10 / Learning Rate</span>
          <h1 class="edu-title">学习率</h1>
          <p class="edu-subtitle">梯度告诉模型往哪边改，学习率决定每一步走多远。亲手把它从太小调到极大，看 Loss 怎么从缓缓下降变成飞起。</p>
        </div>
        <span class="edu-badge">第三章 · 神经网络训练</span>
      </header>

      <nav class="t10-progress" id="progressNav" aria-label="环节进度" data-tr-id="t10_progress_nav" data-tr-view="progress_show" data-tr-props='{"panel":"progress"}'></nav>

      <div class="t10-scene-stack" id="sceneStack" aria-live="polite" data-tr-id="t10_scene_stack_panel" data-tr-view="panel_show" data-tr-props='{"panel":"scene_stack"}'></div>

      <nav class="t10-pager" id="scenePager" aria-label="pager" data-tr-id="t10_pager" data-tr-view="pager_show"></nav>
    </section>
  </main>

  <script src="./guide.js"></script>
  <script src="./script.js"></script>
</body>
</html>
